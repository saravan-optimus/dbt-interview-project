    description: "Bridge table (Many-to-Many). Grain: 1 row per (opportunity_id, pricebook_entry_id) combination. Connects opportunities to products through pricebook entries. NOTE: Simulated from Opportunity.pricebook2id join—production should source OpportunityLineItem object directly."
    meta:
      owner: Sales Analytics
      is_bridge: true
      grain: one row per opportunity + pricebook entry combination
    columns:
      - name: line_item_key
        description: "Surrogate key for the bridge table (composite of opportunity_id + pricebook_entry_id)."
        data_tests:
          - unique
          - not_null
      - name: opportunity_id
        description: "Natural key part 1. Foreign key to fct_opportunities."
