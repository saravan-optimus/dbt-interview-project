                field: contact_id
      - name: case_status
        description: "Status of case."
        data_tests:
          - accepted_values:
              arguments:
                values: ['New', 'In Progress', 'Escalated', 'Closed']
      - name: is_closed
        description: "Whether case is closed."

  - name: fct_leads
    description: "Lead fact table. Grain: 1 row per lead. Lead conversion metrics and outcomes."
