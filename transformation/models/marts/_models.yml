version: 2

models:
  # DIMENSION TABLES
  # ================

  - name: dim_accounts
    description: "Account dimension. Grain: 1 row per account. Contains account attributes, classification, and denormalized owner information."
    meta:
      owner: Sales Analytics
      sensitivity: internal
    columns:
      - name: account_key
        description: "Surrogate key for account (stable across runs via generate_surrogate_key)."
        data_tests:
          - unique
          - not_null
      - name: account_id
        description: "Natural key. Unique identifier for the account from Salesforce."
        data_tests:
          - not_null
      - name: account_name
        description: "Company name."
        data_tests:
          - not_null
      - name: industry
        description: "Industry classification."
      - name: is_active
        description: "Whether account is active."

  - name: dim_campaigns
    description: "Campaign dimension. Grain: 1 row per campaign. Marketing campaign details and metadata."
    meta:
      owner: Marketing Analytics
    columns:
      - name: campaign_key
        description: "Surrogate key for campaign."
        data_tests:
          - unique
          - not_null
      - name: campaign_id
        description: "Natural key."
        data_tests:
          - not_null
      - name: campaign_name
        description: "Campaign name."
      - name: campaign_type
        description: "Type of campaign."
      - name: campaign_status
        description: "Status (Planned, In Progress, Completed)."

  - name: dim_contacts
    description: "Contact dimension. Grain: 1 row per contact. Individual contact records linked to accounts."
    meta:
      owner: Sales Analytics
      sensitivity: PII
    columns:
      - name: contact_key
        description: "Surrogate key for contact."
        data_tests:
          - unique
          - not_null
      - name: contact_id
        description: "Natural key."
        data_tests:
          - not_null
      - name: account_id
        description: "Foreign key to dim_accounts."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_id
      - name: first_name
        description: "Contact first name."
      - name: last_name
        description: "Contact last name."
      - name: email
        description: "Email address."

  - name: dim_date
    description: "Date dimension. Grain: 1 row per date. Built from dbt_date package for time-series analysis."
    meta:
      owner: Data Engineering
      business_unit: shared
    columns:
      - name: date_day
        description: "Calendar date."
        data_tests:
          - unique
          - not_null
      - name: day_of_week
        description: "Day of week (1-7)."
      - name: week_of_year
        description: "Week number (1-53)."
      - name: month_of_year
        description: "Month (1-12)."
      - name: quarter_of_year
        description: "Quarter (1-4)."
      - name: year_number
        description: "Calendar year."

  - name: dim_products
    description: "Product dimension. Grain: 1 row per product. Product details and classifications."
    meta:
      owner: Product Analytics
    columns:
      - name: product_key
        description: "Surrogate key for product."
        data_tests:
          - unique
          - not_null
      - name: product_id
        description: "Natural key."
        data_tests:
          - not_null
      - name: product_name
        description: "Product name."
      - name: product_code
        description: "Product code/SKU."
      - name: product_family
        description: "Product category/family."

  - name: dim_users
    description: "User dimension. Grain: 1 row per Salesforce user. Sales team and support staff profiles."
    meta:
      owner: Sales Operations
    columns:
      - name: user_key
        description: "Surrogate key for user."
        data_tests:
          - unique
          - not_null
      - name: user_id
        description: "Natural key."
        data_tests:
          - not_null
      - name: first_name
        description: "User first name."
      - name: last_name
        description: "User last name."
      - name: full_name
        description: "Concatenated full name."
      - name: email
        description: "Email address."
      - name: department
        description: "Department."

  # FACT TABLES
  # ===========

  - name: fct_opportunities
    description: "Opportunity fact table. Grain: 1 row per opportunity. Incremental materialization with date-based refresh logic. Core sales pipeline metrics."
    meta:
      owner: Sales Analytics
      is_incremental: true
      grain: one row per opportunity
    columns:
      - name: opportunity_key
        description: "Surrogate key (Primary Key)."
        data_tests:
          - unique
          - not_null
      - name: opportunity_id
        description: "Natural key."
        data_tests:
          - not_null
      - name: account_id
        description: "Foreign key to dim_accounts."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_id
      - name: owner_id
        description: "Foreign key to dim_users (sales rep)."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id
      - name: stage_name
        description: "Pipeline stage."
        data_tests:
          - not_null
      - name: amount
        description: "Opportunity value in USD."
      - name: probability
        description: "Estimated win probability (0-100)."
      - name: is_closed
        description: "Whether opportunity is closed."
      - name: is_won
        description: "Whether opportunity was won."
      - name: opportunity_status
        description: "Derived status: Won/Lost/Open/Overdue."
      - name: deal_size_band
        description: "Derived classification: Small/Medium/Large/Enterprise."

  - name: fct_cases
    description: "Support case fact table. Grain: 1 row per case. Support operations metrics."
    meta:
      owner: Support Operations
      grain: one row per case
    columns:
      - name: case_key
        description: "Surrogate key (Primary Key)."
        data_tests:
          - unique
          - not_null
      - name: case_id
        description: "Natural key."
        data_tests:
          - not_null
      - name: account_id
        description: "Foreign key to dim_accounts."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_id
      - name: contact_id
        description: "Foreign key to dim_contacts."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_contacts')
                field: contact_id
      - name: case_status
        description: "Status of case."
      - name: is_closed
        description: "Whether case is closed."

  - name: fct_leads
    description: "Lead fact table. Grain: 1 row per lead. Lead conversion metrics and outcomes."
    meta:
      owner: Sales Analytics
      grain: one row per lead
    columns:
      - name: lead_key
        description: "Surrogate key (Primary Key)."
        data_tests:
          - unique
          - not_null
      - name: lead_id
        description: "Natural key."
        data_tests:
          - not_null
      - name: is_converted
        description: "Conversion flag (True/False)."
      - name: converted_account_id
        description: "FK to dim_accounts if converted (nullable)."
      - name: converted_contact_id
        description: "FK to dim_contacts if converted (nullable)."

  - name: fct_opportunity_line_items
    description: "Bridge table (Many-to-Many). Grain: 1 row per (opportunity_id, pricebook_entry_id). Connects opportunities to products through pricebook entries."
    meta:
      owner: Sales Analytics
      is_bridge: true
      grain: one row per opportunity + product combination
    columns:
      - name: line_item_key
        description: "Surrogate key for the bridge table (composite of opportunity_id + pricebook_entry_id)."
        data_tests:
          - unique
          - not_null
      - name: opportunity_id
        description: "Natural key part 1. Foreign key to fct_opportunities."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_opportunities')
                field: opportunity_id
      - name: product_id
        description: "Natural key part 2. Foreign key to dim_products."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
      - name: account_id
        description: "Denormalized foreign key to dim_accounts."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_accounts')
                field: account_id

  - name: fct_opportunities_summary
    description: "Opportunity summary fact table. Grain: 1 row per opportunity. Uses Jinja loop for dynamic column selection. Aggregated metrics for executive reporting."
    meta:
      owner: Sales Analytics
      grain: one row per opportunity
    columns:
      - name: opportunity_id
        description: "Natural key."
        data_tests:
          - not_null
      - name: account_id
        description: "Foreign key to dim_accounts."
      - name: owner_id
        description: "Foreign key to dim_users."
      - name: opportunity_status
        description: "Opportunity status."
      - name: deal_size_band
        description: "Deal size band."
      - name: amount
        description: "Opportunity amount in USD."
      - name: probability
        description: "Win probability."
      - name: days_to_close
        description: "Days to close."
