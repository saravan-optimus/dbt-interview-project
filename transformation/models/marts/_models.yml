        description: "Foreign key to dim_users (sales rep)."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id
      - name: campaign_id
        description: "Foreign key to dim_campaigns (nullable for non-campaign opps)."
      - name: stage_name
        description: "Pipeline stage (Prospecting, Closed Won, etc)."
        data_tests:
          - accepted_values:
              arguments:
                values: ['Prospecting', 'Qualification', 'Needs Analysis', 'Value Proposition', 
                        'Id. Decision Makers', 'Perception Analysis', 'Proposal/Price Quote', 
                        'Negotiation/Review', 'Closed Won', 'Closed Lost']
      - name: amount
        description: "Opportunity value in USD."
      - name: probability
        description: "Estimated win probability (0-100)."
      - name: is_closed
        description: "Whether opportunity is closed."
      - name: is_won
        description: "Whether opportunity was won."
      - name: opportunity_status
        description: "Derived status: Won/Lost/Open/Overdue."
      - name: deal_size_band
        description: "Derived classification: Small/Medium/Large/Enterprise."

  - name: fct_cases
    description: "Support case fact table. Grain: 1 row per case. Support operations metrics including resolution time and escalation tracking."
    meta:
      owner: Support Operations
      grain: one row per case
    columns:
      - name: case_key
        description: "Surrogate key (Primary Key)."
        data_tests:
